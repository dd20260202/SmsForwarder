name: Weekly Build

# 触发器：去掉了 cron，只保留手动触发
on:
  workflow_dispatch:
    inputs:
      root_sol:
        description: "Build Title"
        required: true
        default: "SmsForwarder"

# ⚠️ 关键：赋予写权限，否则无法创建 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      output: "${{ github.workspace }}/build/app/outputs/apk/release"
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4
      
      # 2. 删除旧的工作流记录 (保持页面整洁)
      - name: Delete Old Workflows
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_pattern: 'Weekly Build'
          
      # 3. 设置 JDK 11
      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          java-package: jdk
          
      # 4. 获取打包秘钥 (修改为你的私有仓库)
      - name: Checkout Android Keystore
        uses: actions/checkout@v4
        with:
          repository: dd20260202/keystore   # ✅ 已经改为你的仓库
          token: ${{ secrets.TOKEN }}
          path: keystore
          
      # 5. 开始编译
      - name: Build with Gradle
        run: bash ./gradlew assembleRelease
      
      # 6. 解析版本号 (✅ 删除了官方往 XUpdate 传文件的报错代码)
      - name: Parse output-metadata.json
        run: |
          metadata_file="${{ env.output }}/output-metadata.json"
          apk=$(jq -r '.elements[0].outputFile' "$metadata_file")
          
          if [[ $apk =~ SmsF_([^_]+)_([^_]+)_(.+)_release.apk ]]; then
              versionName="${BASH_REMATCH[1]}"
              versionCode="${BASH_REMATCH[2]}"
              
              echo "ver_name=$versionName" >> $GITHUB_ENV
              echo "ver_code=${versionCode: -3}" >> $GITHUB_ENV
              
              echo "✅ 解析成功: v$versionName ($versionCode)"
          else
              echo "❌ 解析文件名失败，使用默认时间戳作为版本号"
              echo "ver_name=$(date +%Y%m%d)" >> $GITHUB_ENV
              echo "ver_code=$(date +%H%M)" >> $GITHUB_ENV
          fi

      # 7. 发布到 GitHub Releases 🚀
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.ver_name }}_${{ env.ver_code }}
          name: SmsForwarder v${{ env.ver_name }} (Build ${{ env.ver_code }})
          body: |
            🎯 私有定制版自动构建
            - 包含 IPv6 优先解析补丁
            - 编译时间: $(date '+%Y-%m-%d %H:%M:%S')
          draft: false
          prerelease: false
          files: ${{ env.output }}/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }} 

      # 8. 保留 Artifacts 备份
      - name: Upload App To Artifact universal
        if: success () || failure ()
        uses: actions/upload-artifact@v4
        with:
          name: "SmsF_${{ env.ver_name }}_100${{ env.ver_code }}_universal_release.apk"
          path: "${{ env.output }}/SmsF_*_universal_release.apk"
          
      - name: Upload App To Artifact armeabi-v7a
        if: success () || failure ()
        uses: actions/upload-artifact@v4
        with:
          name: "SmsF_${{ env.ver_name }}_200${{ env.ver_code }}_armeabi-v7a_release.apk"
          path: "${{ env.output }}/SmsF_*_armeabi-v7a_release.apk"
          
      - name: Upload App To Artifact arm64-v8a
        if: success () || failure ()
        uses: actions/upload-artifact@v4
        with:
          name: "SmsF_${{ env.ver_name }}_300${{ env.ver_code }}_arm64-v8a_release.apk"
          path: "${{ env.output }}/SmsF_*_arm64-v8a_release.apk"
